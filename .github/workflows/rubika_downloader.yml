name: Download File to Repo

on:
  workflow_dispatch:   # اجرای دستی از تب Actions
  #schedule:
  #  - cron: '0 0 * * *'  # در صورت تمایل به اجرای خودکار، این خط را از کامنت خارج کنید

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ⚠️ اجازهٔ push به ریپو

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download file
        run: python download_file.py

      - name: Commit and push file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "چیز جدیدی برای commit وجود ندارد."
          else
            git commit -m "دانلود خودکار فایل"
            git push
          fi
